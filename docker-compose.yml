# ParkPro - Sistema de Gestion de Parqueadero
# Archivo de configuración Docker Compose

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: parkpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parkpro_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_CO.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - parkpro-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d parkpro_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parkpro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - parkpro-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkpro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: parkpro_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-8h}
      SWAGGER_PATH: ${SWAGGER_PATH:-/api/docs}
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - parkpro-network

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: parkpro-admin
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:3000/api}
      VITE_WS_URL: ws://localhost:3000
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - parkpro-network

  nginx:
    image: nginx:alpine
    container_name: parkpro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend-admin
    networks:
      - parkpro-network

networks:
  parkpro-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
